name: atml
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy
  - matplotlib
  - scikit-learn
  - scikit-image
  - nibabel
  - tqdm
  - scipy
  - pandas
  - pyyaml
  - pip:
    - torch==2.3.0
    - torchvision==0.18.0
    - monai>=1.3.0
    - monai-generative>=0.2.3
    - einops
    - timm
    - opencv-python
    # Note: azure-ai-ml, azureml-mlflow removed (Azure plan abandoned)
    # Note: mlflow removed (not used in current pipeline)